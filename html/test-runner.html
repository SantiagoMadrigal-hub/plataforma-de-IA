<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexora - Test Runner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; background: #fafafa; color: #1a1a1a; }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        h2 { font-size: 1rem; margin: 1rem 0 0.25rem; padding: 0.25rem 0.5rem; background: #f0f0f0; border-radius: 4px; }
        #output p { margin: 0.15rem 0; font-size: 0.875rem; }
        .pass { color: #16a34a; }
        .fail { color: #dc2626; font-weight: 600; }
        .summary { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; font-weight: 600; text-align: center; }
        .summary.pass { background: #dcfce7; }
        .summary.fail { background: #fee2e2; }
    </style>
</head>
<body>
    <h1>Lexora Test Suite</h1>
    <p style="color:#666;margin-bottom:1rem;">Ejecutando tests de servicios y controladores</p>
    <div id="output"></div>

    <script src="/js/vendor/iconify-icon.min.js"></script>
    <script src="/js/vendor/micromodal.min.js"></script>
        <script type="module" src="/js/test/tests.js"></script>
</body>
</html>
