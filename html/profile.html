<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gestiona tu información personal en Lexora"
    />
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/vendor/aos.css" />
    <link rel="stylesheet" href="css/vendor/glide.core.min.css" />

    <link rel="stylesheet" href="css/variables-globales.css" />
    <link rel="stylesheet" href="css/estilos-globales.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/componentes.css" />
    <link rel="stylesheet" href="css/secciones-especificas.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <!--
      FIX de layout específico para esta página.
      El grid de 2 columnas del perfil (definido en React) necesita más
      de ~800px de ancho para mostrar las tarjetas lado a lado. La clase
      .container-layout (compartida con páginas angostas tipo login)
      estaba limitando el ancho aquí, dejando todo apretado en 1 columna
      con espacio muerto a los lados. Este bloque va DESPUÉS de los
      stylesheets globales a propósito, para ganar en la cascada sin
      tener que tocar layout.css y arriesgar romper otras páginas.
    -->
    <style>
      /* El ajuste clave: ancho suficiente para que el grid de 2
         columnas de las tarjetas del perfil respire de verdad. */
      .profile-container {
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 32px 24px 64px;
        box-sizing: border-box;
      }

      @media (max-width: 900px) {
        .profile-container {
          padding: 24px 16px 48px;
        }
      }
    </style>

    <title>Perfil - Lexora</title>
  </head>
  <body class="dark-theme">
    <script src="js/vendor/iconify-icon.min.js"></script>
    <script src="js/vendor/micromodal.min.js"></script>
    <script src="js/vendor/glide.min.js"></script>
    <script src="js/vendor/aos.js"></script>
    <script type="module" src="js/main.js"></script>

    <header class="app-header">
      <div class="container-layout">
        <div class="app-header-top">
          <div class="header-left">
            <a href="index.html" class="header-home" title="Ir al inicio">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <span class="breadcrumb-sep">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </span>
            <a href="dashboard.html" class="breadcrumb-link">Dashboard</a>
            <span class="breadcrumb-sep">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </span>
            <span class="breadcrumb-current">Perfil</span>
          </div>
          <div class="header-right">
            <div class="user-menu">
              <button class="user-menu-trigger" aria-haspopup="true" aria-expanded="false">
                <span class="avatar-fallback">U</span>
                <svg class="chevron-down" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div class="user-dropdown">
                <div class="dropdown-header">
                  <span class="dropdown-user-name">Usuario</span>
                  <span class="dropdown-user-email">usuario@ejemplo.com</span>
                </div>
                <div class="dropdown-plan">Plan Pro</div>
                <div class="dropdown-divider"></div>
                <a href="settings.html" class="dropdown-item">Configuración</a>
                <a href="#" class="dropdown-item dropdown-item--danger">Cerrar Sesión</a>
              </div>
            </div>
          </div>
        </div>
        <div class="app-header-content">
          <h1>Mi perfil</h1>
          <p class="header-subtitle">
            Administra tu información personal y mantén tus datos actualizados
          </p>
        </div>
      </div>
    </header>

    <main class="container-layout profile-container">
      <!-- El componente React toma el control completo de esta sección -->
      <div class="react-mount" data-component="UserProfileManager"></div>
    </main>

    <!-- Modal de éxito (Se mantiene por si necesitas llamarlo desde JS clásico después) -->
    <div class="modal" id="success-profile" aria-hidden="true">
      <div class="modal__overlay" data-micromodal-close>
        <div class="modal__container" role="dialog" aria-modal="true">
          <h2>✅ Perfil actualizado</h2>
          <p>Tus datos personales se han guardado correctamente.</p>
          <button
            class="btn-full modal__close"
            data-micromodal-close
            aria-label="Cerrar"
          >
            Cerrar
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
