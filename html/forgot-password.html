<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recupera tu contraseña de Lexora"/>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables-globales.css">
    <link rel="stylesheet" href="css/estilos-globales.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">

    <title>Recuperar Contraseña - Lexora</title>
  </head>
  <body>

    <main class="signup-wrapper login-page">
      <div class="login-logo">
        <svg class="login-logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="login-logo-text">Lexora</span>
      </div>
      <div class="signup-box">

        <div class="signup-header">
          <h2>Recuperar contraseña</h2>
          <p>Te enviaremos un enlace para restablecerla.</p>
        </div>

        <form class="form" id="forgot-form">
          <div class="form-group">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" class="form-input" required />
          </div>

          <button type="submit" class="btn-full" id="btn-submit">Enviar enlace</button>

          <div class="signup-footer">
            <p><a href="login.html">Volver a iniciar sesión</a></p>
          </div>
        </form>

        <div id="success-message" style="display:none;text-align:center;padding:2rem 1rem">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 1rem;display:block">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <h3 style="color:#fff;margin:0 0 0.5rem">Revisa tu correo</h3>
          <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;line-height:1.5">Si existe una cuenta con ese correo, recibirás un enlace para restablecer tu contraseña.</p>
        </div>

      </div>
    </main>

    <footer class="login-footer">
      <p>&copy; 2026 Lexora. Todos los derechos reservados.</p>
    </footer>

    <script type="module" src="js/main.js"></script>

    <script>
      document.getElementById('forgot-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btn-submit');
        var email = document.getElementById('correo').value;

        btn.disabled = true;
        btn.textContent = 'Enviando...';

        try {
          await fetch('/api/auth/password?action=forgot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
        } catch {}

        document.getElementById('forgot-form').style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
      });
    </script>
  </body>
</html>
