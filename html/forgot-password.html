<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recupera tu contraseña de Lexora"/>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <title>Recuperar Contraseña - Lexora</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: #09090b;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      /* --- 5. Gradient mesh + grain --- */
      .page::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(ellipse 60% 50% at 25% 40%, rgba(99,102,241,0.08) 0%, transparent 70%),
          radial-gradient(ellipse 50% 40% at 75% 60%, rgba(139,92,246,0.06) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 50% 80%, rgba(129,140,248,0.04) 0%, transparent 60%);
        animation: breathe 12s ease-in-out infinite alternate;
      }

      @keyframes breathe {
        0% { opacity: 0.6; }
        100% { opacity: 1; }
      }

      .page::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 256px 256px;
        pointer-events: none;
      }

      /* --- Card (6. Glassmorphism) --- */
      .card {
        position: relative;
        width: 100%;
        max-width: 420px;
        background: rgba(24,24,32,0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 2.5rem 2rem 2rem;
        box-shadow: 0 0 90px rgba(139,92,246,0.25), 0 24px 80px rgba(0,0,0,0.5);
      }

      /* --- Logo --- */
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-bottom: 2rem;
      }

      .logo svg { width: 24px; height: 24px; }

      .logo span {
        font-size: 1.15rem;
        font-weight: 700;
        background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* --- 9. Typography --- */
      .header { text-align: center; margin-bottom: 2rem; }

      .header h1 {
        font-size: 1.625rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      .header p {
        font-size: 0.9rem;
        color: #9a9aa5;
        margin: 0;
        line-height: 1.6;
      }

      /* --- Form --- */
      .form { display: flex; flex-direction: column; gap: 1.25rem; }

      /* --- 7. Input with icon --- */
      .field { position: relative; }

      .field-icon {
        position: absolute;
        left: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        color: rgba(255,255,255,0.25);
        pointer-events: none;
        transition: color 0.2s;
      }

      .field input {
        width: 100%;
        height: 48px;
        padding: 0 1rem 0 2.75rem;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        color: #fff;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      .field input::placeholder { color: #55555f; }

      .field input:hover { border-color: rgba(255,255,255,0.14); }

      .field input:focus {
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3.5px rgba(139,92,246,0.15);
        background: rgba(255,255,255,0.06);
      }

      .field:focus-within .field-icon { color: #8b5cf6; }

      /* --- 1. Error state --- */
      .field.error input {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
        animation: shake 0.35s ease;
      }

      .field.error .field-icon { color: #ef4444; }

      .field-msg {
        min-height: 1.25rem;
        font-size: 0.78rem;
        line-height: 1.25rem;
        margin-top: 0.25rem;
        color: #ef4444;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .field.error .field-msg { opacity: 1; }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-5px); }
        40% { transform: translateX(5px); }
        60% { transform: translateX(-3px); }
        80% { transform: translateX(3px); }
      }

      /* --- 3 + 8. Button --- */
      .btn {
        position: relative;
        width: 100%;
        height: 48px;
        border: none;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        box-shadow: 0 2px 16px rgba(99,102,241,0.25);
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(99,102,241,0.4);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      .btn .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      .btn.loading .btn-label { visibility: hidden; }
      .btn.loading .spinner { display: block; position: absolute; }

      .btn .arrow {
        display: inline-block;
        transition: transform 0.25s;
      }

      .btn:hover:not(:disabled) .arrow {
        transform: translateX(3px);
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* --- Back link --- */
      .back {
        text-align: center;
        margin-top: 1.25rem;
      }

      .back a {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.35);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: color 0.2s;
      }

      .back a:hover { color: rgba(255,255,255,0.7); }

      .back a svg {
        width: 14px; height: 14px;
        transition: transform 0.2s;
      }

      .back a:hover svg { transform: translateX(-2px); }

      /* --- 2. Success --- */
      .success {
        display: none;
        text-align: center;
        animation: fadeUp 0.45s ease;
      }

      .success-icon {
        width: 56px; height: 56px;
        margin: 0 auto 1.25rem;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04));
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(34,197,94,0.15);
      }

      .success-icon svg { width: 26px; height: 26px; color: #22c55e; }

      .success h2 {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 0.5rem;
      }

      .success p {
        font-size: 0.88rem;
        color: #9a9aa5;
        line-height: 1.6;
        margin: 0;
      }

      .success .email-sent {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.35rem 1rem;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        font-size: 0.82rem;
        font-weight: 500;
        color: rgba(255,255,255,0.55);
      }

      .success .resend {
        margin-top: 1.25rem;
        font-size: 0.82rem;
        color: #9a9aa5;
      }

      .success .resend button {
        background: none;
        border: none;
        color: #818cf8;
        font-weight: 600;
        font-size: 0.82rem;
        font-family: inherit;
        cursor: pointer;
        transition: color 0.2s;
      }

      .success .resend button:hover { color: #8b5cf6; }
      .success .resend button:disabled { color: #55555f; cursor: default; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* --- 4. Footer --- */
      .footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.78rem;
        color: #4b4b55;
      }

      @media (max-width: 480px) {
        .card { padding: 1.75rem 1.25rem; border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="card">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>Lexora</span>
        </div>

        <div class="header">
          <h1>¿Olvidaste tu contraseña?</h1>
          <p>Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
        </div>

        <form class="form" id="form">
          <div class="field" id="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required />
            <div class="field-msg" id="field-msg">Ingresa un correo válido</div>
          </div>

          <button type="submit" class="btn" id="btn">
            <span class="spinner"></span>
            <span class="btn-label">Enviar enlace <span class="arrow">&rarr;</span></span>
          </button>
        </form>

        <div class="success" id="success">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <h2>Revisa tu correo</h2>
          <p>Enviamos un enlace de recuperación a</p>
          <span class="email-sent" id="sent-email"></span>
          <div class="resend">
            ¿No recibiste nada?
            <button id="resend-btn">Reenviar</button>
            <span id="cooldown" style="display:none;color:#55555f"></span>
          </div>
        </div>

        <div class="back">
          <a href="login.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Volver a iniciar sesión
          </a>
        </div>
      </div>

      <div class="footer">&copy; 2026 Lexora</div>
    </main>

    <script type="module" src="js/main.js"></script>

    <script>
      (function() {
        var form = document.getElementById('form');
        var emailInput = document.getElementById('email');
        var field = document.getElementById('field');
        var msg = document.getElementById('field-msg');
        var btn = document.getElementById('btn');
        var success = document.getElementById('success');
        var sentEmail = document.getElementById('sent-email');
        var resendBtn = document.getElementById('resend-btn');
        var cooldown = document.getElementById('cooldown');
        var currentEmail = '';
        var cooldownTimer = null;

        function validate() {
          var val = emailInput.value.trim();
          if (!val || !val.includes('@') || !val.includes('.')) {
            msg.textContent = 'Ingresa un correo válido';
            field.classList.add('error');
            return false;
          }
          field.classList.remove('error');
          return true;
        }

        emailInput.addEventListener('input', function() {
          if (field.classList.contains('error')) validate();
        });

        function setLoading(loading) {
          btn.classList.toggle('loading', loading);
          btn.disabled = loading;
        }

        async function sendEmail(email) {
          try {
            await fetch('/api/auth/password?action=forgot', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email }),
            });
          } catch {}
        }

        form.addEventListener('submit', async function(e) {
          e.preventDefault();
          if (!validate()) return;

          currentEmail = emailInput.value.trim();
          setLoading(true);
          await sendEmail(currentEmail);
          setLoading(false);

          form.style.display = 'none';
          sentEmail.textContent = currentEmail;
          success.style.display = 'block';
          startCooldown();
        });

        function startCooldown() {
          var seconds = 30;
          resendBtn.style.display = 'none';
          cooldown.style.display = 'inline';
          cooldown.textContent = 'Espera ' + seconds + 's';

          if (cooldownTimer) clearInterval(cooldownTimer);
          cooldownTimer = setInterval(function() {
            seconds--;
            if (seconds <= 0) {
              clearInterval(cooldownTimer);
              cooldownTimer = null;
              cooldown.style.display = 'none';
              resendBtn.style.display = 'inline';
              return;
            }
            cooldown.textContent = 'Espera ' + seconds + 's';
          }, 1000);
        }

        resendBtn.addEventListener('click', async function() {
          resendBtn.disabled = true;
          await sendEmail(currentEmail);
          resendBtn.disabled = false;
          startCooldown();
        });
      })();
    </script>
  </body>
</html>
