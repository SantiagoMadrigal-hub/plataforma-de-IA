<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recupera tu contraseña de Lexora"/>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables-globales.css">
    <link rel="stylesheet" href="css/estilos-globales.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">

    <style>
      .recovery-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #09090b 0%, #111113 50%, #0a0a0d 100%);
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
      }

      .recovery-page::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at 40% 50%, rgba(99,102,241,0.03) 0%, transparent 60%),
                    radial-gradient(ellipse at 60% 50%, rgba(139,92,246,0.02) 0%, transparent 60%);
        animation: bgShift 20s ease-in-out infinite alternate;
        pointer-events: none;
      }

      @keyframes bgShift {
        0% { transform: translate(0, 0) rotate(0deg); }
        100% { transform: translate(-5%, -3%) rotate(3deg); }
      }

      .recovery-card {
        position: relative;
        width: 100%;
        max-width: 420px;
        background: rgba(24,24,27,0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      }

      .recovery-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-bottom: 2rem;
      }

      .recovery-logo svg {
        width: 24px;
        height: 24px;
      }

      .recovery-logo span {
        font-size: 1.15rem;
        font-weight: 700;
        background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .recovery-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .recovery-header h1 {
        font-size: 1.35rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }

      .recovery-header p {
        font-size: 0.88rem;
        color: rgba(255,255,255,0.45);
        margin: 0;
        line-height: 1.5;
      }

      .recovery-form {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      .recovery-field label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: rgba(255,255,255,0.7);
        margin-bottom: 0.4rem;
      }

      .recovery-field input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        color: #fff;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
      }

      .recovery-field input:hover {
        border-color: rgba(255,255,255,0.14);
      }

      .recovery-field input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        background: rgba(255,255,255,0.06);
      }

      .recovery-field input::placeholder {
        color: rgba(255,255,255,0.2);
      }

      .recovery-submit {
        width: 100%;
        padding: 0.8rem;
        border: none;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.25s ease;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        box-shadow: 0 2px 16px rgba(99,102,241,0.25);
        position: relative;
      }

      .recovery-submit:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 4px 24px rgba(99,102,241,0.35);
      }

      .recovery-submit:active:not(:disabled) {
        transform: translateY(0);
      }

      .recovery-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .recovery-submit .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        position: absolute;
        left: 50%;
        top: 50%;
        margin: -9px 0 0 -9px;
      }

      .recovery-submit.loading .btn-text { visibility: hidden; }
      .recovery-submit.loading .spinner { display: block; }

      @keyframes spin { to { transform: rotate(360deg); } }

      .recovery-back {
        text-align: center;
        margin-top: 1.25rem;
      }

      .recovery-back a {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.35);
        text-decoration: none;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }

      .recovery-back a:hover {
        color: rgba(255,255,255,0.7);
      }

      .recovery-back a svg {
        width: 14px;
        height: 14px;
        transition: transform 0.2s;
      }

      .recovery-back a:hover svg {
        transform: translateX(-2px);
      }

      .recovery-success {
        display: none;
        text-align: center;
        padding: 1rem 0;
        animation: fadeUp 0.5s ease;
      }

      .recovery-success-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04));
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(34,197,94,0.15);
      }

      .recovery-success-icon svg {
        width: 26px;
        height: 26px;
        color: #22c55e;
      }

      .recovery-success h2 {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 0.5rem;
      }

      .recovery-success p {
        font-size: 0.88rem;
        color: rgba(255,255,255,0.45);
        line-height: 1.6;
        margin: 0 0 0.25rem;
      }

      .recovery-success .email-highlight {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.4rem 1rem;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        font-size: 0.82rem;
        font-weight: 500;
        color: rgba(255,255,255,0.6);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }

      .recovery-field.error input {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
        animation: shake 0.4s ease;
      }

      .recovery-field .field-error {
        font-size: 0.78rem;
        color: #ef4444;
        margin-top: 0.3rem;
        display: none;
      }

      .recovery-field.error .field-error { display: block; }

      .recovery-footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.78rem;
        color: rgba(255,255,255,0.2);
      }

      @media (max-width: 480px) {
        .recovery-card {
          padding: 1.75rem 1.25rem;
          border-radius: 16px;
        }
      }
    </style>

    <title>Recuperar Contraseña - Lexora</title>
  </head>
  <body>
    <main class="recovery-page">
      <div class="recovery-card">
        <div class="recovery-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>Lexora</span>
        </div>

        <div class="recovery-header">
          <h1>¿Olvidaste tu contraseña?</h1>
          <p>Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
        </div>

        <form class="recovery-form" id="forgot-form">
          <div class="recovery-field" id="email-field">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" autocomplete="email" required />
            <div class="field-error">Ingresa un correo válido</div>
          </div>

          <button type="submit" class="recovery-submit" id="btn-submit">
            <span class="btn-text">Enviar enlace</span>
            <span class="spinner"></span>
          </button>
        </form>

        <div class="recovery-success" id="success-message">
          <div class="recovery-success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <h2>Revisa tu correo</h2>
          <p>Si existe una cuenta con ese correo, recibirás un enlace para restablecer tu contraseña.</p>
          <span class="email-highlight" id="sent-email"></span>
        </div>

        <div class="recovery-back">
          <a href="login.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Volver a iniciar sesión
          </a>
        </div>
      </div>

      <div class="recovery-footer">&copy; 2026 Lexora</div>
    </main>

    <script type="module" src="js/main.js"></script>

    <script>
      document.getElementById('forgot-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btn-submit');
        var input = document.getElementById('correo');
        var email = input.value.trim();
        var field = document.getElementById('email-field');

        field.classList.remove('error');

        if (!email || !email.includes('@')) {
          field.classList.add('error');
          return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        try {
          await fetch('/api/auth/password?action=forgot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
        } catch {}

        document.getElementById('sent-email').textContent = email;
        document.getElementById('forgot-form').style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
      });
    </script>
  </body>
</html>
