<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de control de Lexora" />
    <meta name="robots" content="noindex,nofollow" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/vendor/aos.css">
    <link rel="stylesheet" href="css/vendor/glide.core.min.css">

    <link rel="stylesheet" href="css/variables-globales.css">
    <link rel="stylesheet" href="css/estilos-globales.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/secciones-especificas.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="stylesheet" href="js/assets/index.css">

    <link rel="icon" type="image/svg+xml" href="js/favicon.svg">
    <title>Dashboard - Lexora</title>
</head>
<body class="dark-theme">

    <div class="dashboard-layout">
        
        <aside class="sidebar">
            <div class="sidebar-top">
                <a href="dashboard.html" style="text-decoration: none;"><h2 class="sidebar-logo">Lexora</h2></a>
                <button class="sidebar-toggle" aria-label="Abrir menú" aria-expanded="false">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html" class="active">Dashboard</a></li>
                    <li><a href="generador.html">Generador de IA</a></li>
                    <li><a href="history.html">Historial</a></li>
                    <li><a href="settings.html">Configuración</a></li>
                    <li><a href="profile.html">Perfil</a></li>
                    <li><a href="planes.html">Planes</a></li>
                </ul>
            </nav>
        </aside>
        
        <div class="dashboard-content">
            
            <header class="dashboard-header">
                <p class="welcome-text">Dashboard</p>
                <div class="user-info">
                    <p class="credits-badge" id="credits-badge">Créditos: —</p>
                    <div class="user-menu">
                        <button class="user-menu-trigger" aria-haspopup="true" aria-expanded="false">
                            <span class="avatar-fallback">U</span>
                            <svg class="chevron-down" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </button>
                        <div class="user-dropdown">
                            <div class="dropdown-header">
                                <span class="dropdown-user-name">Usuario</span>
                                <span class="dropdown-user-email">usuario@ejemplo.com</span>
                            </div>
                            <div class="dropdown-divider"></div>
                            <a href="profile.html" class="dropdown-item">Perfil</a>
                            <a href="settings.html" class="dropdown-item">Configuración</a>
                            <a href="planes.html" class="dropdown-item">Planes</a>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item dropdown-item--danger">Cerrar Sesión</a>
                        </div>
                    </div>
                </div>
            </header>

            <main class="dashboard-main">
                
                <section class="welcome-section">
                    <h2>Bienvenido de nuevo 👋</h2>
                    <a href="generador.html" class="btn-primary">+ Nuevo documento</a>
                </section>

                <section>
                    <!-- Debajo de tu saludo, agregamos el de métricas -->
                <div class="react-mount" data-component="MetricsPanel"></div>
                <!-- Más abajo, donde están los documentos, agregamos el de la lista -->
                <div class="react-mount" data-component="SmartDocumentList"></div>
                </section>


            </main>
        </div>
    </div>

    <script src="js/vendor/micromodal.min.js"></script>
    <script src="js/vendor/glide.min.js"></script>
    <script src="js/vendor/aos.js"></script>
    <script type="module" src="js/main.js"></script>
    <script>
      (function() {
        var toggle = document.querySelector('.sidebar-toggle');
        var sidebar = document.querySelector('.sidebar');
        if (!toggle || !sidebar) return;
        toggle.addEventListener('click', function() {
          var expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', String(!expanded));
          sidebar.classList.toggle('sidebar--open');
        });
        document.addEventListener('click', function(e) {
          if (sidebar.classList.contains('sidebar--open') && !sidebar.contains(e.target)) {
            sidebar.classList.remove('sidebar--open');
            toggle.setAttribute('aria-expanded', 'false');
          }
        });
      })();
    </script>
</body>
</html>
