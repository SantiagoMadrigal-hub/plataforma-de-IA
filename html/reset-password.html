<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Restablece tu contraseña de Lexora"/>
    <meta name="robots" content="noindex,nofollow" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables-globales.css">
    <link rel="stylesheet" href="css/estilos-globales.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">

    <title>Restablecer Contraseña - Lexora</title>
  </head>
  <body>

    <main class="signup-wrapper login-page">
      <div class="login-logo">
        <svg class="login-logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="login-logo-text">Lexora</span>
      </div>
      <div class="signup-box">

        <div class="signup-header">
          <h2>Nueva contraseña</h2>
          <p>Ingresa tu nueva contraseña.</p>
        </div>

        <form class="form" id="reset-form">
          <div class="form-group">
            <label for="contrasena" class="form-label">Nueva contraseña</label>
            <div class="input-wrapper">
              <input type="password" id="contrasena" name="contrasena" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6" />
              <button type="button" class="password-toggle" aria-label="Mostrar contraseña">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-full" id="btn-submit">Restablecer contraseña</button>
        </form>

        <div id="error-message" style="display:none;color:#f87171;text-align:center;font-size:0.9rem;padding:0.5rem"></div>
        <div id="success-message" style="display:none;text-align:center;padding:2rem 1rem">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 1rem;display:block">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <h3 style="color:#fff;margin:0 0 0.5rem">Contraseña actualizada</h3>
          <p style="color:rgba(255,255,255,0.5);font-size:0.9rem">Ya puedes iniciar sesión con tu nueva contraseña.</p>
          <a href="login.html" class="btn-full" style="display:inline-block;text-decoration:none;margin-top:1rem">Ir a iniciar sesión</a>
        </div>

      </div>
    </main>

    <footer class="login-footer">
      <p>&copy; 2026 Lexora. Todos los derechos reservados.</p>
    </footer>

    <script type="module" src="js/main.js"></script>

    <script>
      var token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('error-message').textContent = 'Enlace inválido. Solicita un nuevo enlace de recuperación.';
        document.getElementById('error-message').style.display = 'block';
      }

      document.querySelectorAll('.password-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var input = this.closest('.input-wrapper').querySelector('.form-input');
          var isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          this.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
        });
      });

      document.getElementById('reset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btn-submit');
        var password = document.getElementById('contrasena').value;
        var errorEl = document.getElementById('error-message');

        if (password.length < 6) {
          errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres';
          errorEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Guardando...';
        errorEl.style.display = 'none';

        try {
          var res = await fetch('/api/auth/password?action=reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });
          var data = await res.json();

          if (!res.ok) {
            errorEl.textContent = data.error || 'Error al restablecer la contraseña';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Restablecer contraseña';
            return;
          }

          document.getElementById('reset-form').style.display = 'none';
          document.getElementById('success-message').style.display = 'block';
        } catch {
          errorEl.textContent = 'Error de conexión. Intenta de nuevo.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Restablecer contraseña';
        }
      });
    </script>
  </body>
</html>
