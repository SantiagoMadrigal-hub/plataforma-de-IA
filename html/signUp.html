<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crea tu cuenta en Lexora"/>
    <meta name="robots" content="index,follow" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href=".. /css/vendor/aos.css">
    <link rel="stylesheet" href=".. /css/vendor/glide.core.min.css">
    <link rel="stylesheet" href=" /css/variables-globales.css">
    <link rel="stylesheet" href=" /css/estilos-globales.css">
    <link rel="stylesheet" href=" /css/layout.css">
    <link rel="stylesheet" href=" /css/componentes.css">
    <link rel="stylesheet" href=" /css/secciones-especificas.css">
    <link rel="stylesheet" href=" /css/responsive.css">

    <!-- Google Identity SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer
            onload="window.dispatchEvent(new Event('google-sdk-ready'))"></script>

    <title>Crear Cuenta - Lexora</title>
  </head>
  <body>

    <main class="signup-wrapper login-page">
      <div class="login-logo">
        <svg class="login-logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="login-logo-text">Lexora</span>
      </div>
      <div class="signup-box">

        <div class="signup-header">
          <h2>Crear cuenta</h2>
          <p class="signup-subtitle">Crea contenido con IA.</p>
        </div>

        <!-- Botón de Google -->
        <div class="google-signin-btn" data-text="signup_with" style="margin-bottom: 16px; display:flex; justify-content:center;"></div>
        <p class="form-error-google" style="color:#f87171; font-size:0.85rem; text-align:center; min-height:1rem;"></p>

        <div class="divider" style="display:flex; align-items:center; gap:10px; margin:12px 0;">
          <span style="flex:1; height:1px; background:rgba(255,255,255,0.1);"></span>
          <span style="font-size:0.8rem; color:rgba(255,255,255,0.4);">o regístrate con email</span>
          <span style="flex:1; height:1px; background:rgba(255,255,255,0.1);"></span>
        </div>

        <form autocomplete="on" class="form" id="register-form" data-success-modal="success-signup">
          
          <div class="form-group">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-input" placeholder="Nombre completo" required/>
          </div>
          
          <div class="form-group">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email" id="correo" name="correo" class="form-input" placeholder="tucorreo@ejemplo.com" required />
          </div>
          
          <div class="form-group">
            <label for="contrasena" class="form-label">Contraseña</label>
            <div class="input-wrapper">
              <input type="password" id="contrasena" name="contrasena" class="form-input" required />
              <button type="button" class="password-toggle" aria-label="Mostrar contraseña">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <small class="form-helper">Mínimo 8 caracteres</small>
            <div class="password-strength">
              <div class="password-strength__bar" id="password-strength-bar"></div>
            </div>
            <small class="password-strength__label" id="password-strength-label"></small>
          </div>
          
          <div class="form-group">
            <label class="checkbox">
              <input type="checkbox" class="checkbox__input" required>
              <span class="checkbox__custom">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 6 9 17l-5-5"/>
                </svg>
              </span>
              <span class="checkbox__text">Acepto los <a href="/terminos" target="_blank">términos y condiciones</a></span>
            </label>
          </div>

          <button type="submit" class="btn-full">Crear cuenta</button>

          <div class="signup-footer">
            <p><span>¿Ya tienes una cuenta?</span> <a href="login.html">Inicia sesión</a></p>
          </div>

        </form>
      </div>
    </main>

    <footer class="login-footer">
      <p>&copy; 2026 Lexora. Todos los derechos reservados.</p>
    </footer>

    <div class="modal" id="success-signup" aria-hidden="true">
      <div class="modal__overlay" data-micromodal-close>
        <div class="modal__container" role="dialog" aria-modal="true">
          <h2>🎉 Cuenta creada</h2>
          <p>Bienvenido a Lexora. Serás redirigido al dashboard.</p>
          <button class="btn-full modal__close" data-micromodal-close>Ir al Dashboard</button>
        </div>
      </div>
    </div>

    <script src="  /js/vendor/iconify-icon.min.js"></script>
    <script src="  /js/vendor/micromodal.min.js"></script>
    <script src="  /js/vendor/glide.min.js"></script>
    <script src="  /js/vendor/aos.js"></script>
    <script type="module" src="  /js/main.js"></script>

    <script>
      document.querySelectorAll('.password-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var input = this.closest('.input-wrapper').querySelector('.form-input');
          var isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          this.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
        });
      });

      document.getElementById('contrasena').addEventListener('input', function() {
        var val = this.value;
        var bar = document.getElementById('password-strength-bar');
        var label = document.getElementById('password-strength-label');
        var score = 0;
        if (val.length >= 8) score++;
        if (val.length >= 12) score++;
        if (/[a-z]/.test(val) && /[A-Z]/.test(val)) score++;
        if (/\d/.test(val)) score++;
        if (/[^a-zA-Z0-9]/.test(val)) score++;
        bar.className = 'password-strength__bar';
        if (val.length === 0) { bar.style.width = '0%'; label.textContent = ''; }
        else if (score <= 2) { bar.classList.add('weak'); label.textContent = 'Débil'; }
        else if (score <= 3) { bar.classList.add('medium'); label.textContent = 'Media'; }
        else { bar.classList.add('strong'); label.textContent = 'Fuerte'; }
      });
    </script>
  </body>
</html>
